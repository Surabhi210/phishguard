<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PhishGuard — Email Threat Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --bg:          #080C16;
  --surface:     #0F1623;
  --surface2:    #161F30;
  --surface3:    #1C2840;
  --border:      #1E2D45;
  --border2:     #253450;
  --red:         #F04747;
  --red-glow:    rgba(240,71,71,.18);
  --red-border:  rgba(240,71,71,.28);
  --green:       #23D18B;
  --green-glow:  rgba(35,209,139,.15);
  --green-border:rgba(35,209,139,.28);
  --amber:       #F0A832;
  --amber-glow:  rgba(240,168,50,.13);
  --blue:        #4F9EF8;
  --blue-glow:   rgba(79,158,248,.18);
  --muted:       #8493A8;
  --muted2:      #5A6A80;
  --text:        #D8E4F0;
  --text2:       #A8BDD0;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --sans: 'Inter', system-ui, sans-serif;
  --radius: 10px;
  --transition: .18s ease;
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   SCANLINE OVERLAY (ambient texture)
══════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,.04) 2px,
    rgba(0,0,0,.04) 4px
  );
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════
   LAYOUT
══════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
header {
  padding: 36px 0 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.header-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, rgba(79,158,248,.2), rgba(79,158,248,.06));
  border: 1px solid rgba(79,158,248,.25);
  border-radius: 14px;
  display: grid; place-items: center;
  font-size: 26px;
  flex-shrink: 0;
}

.header-title {
  font-family: var(--mono);
  font-size: 1.65rem;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
}

.header-sub {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(35,209,139,.1);
  border: 1px solid rgba(35,209,139,.22);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--green);
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 7px var(--green);
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ══════════════════════════════════════
   SECTION LABEL
══════════════════════════════════════ */
.section-label {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--blue);
  margin: 28px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ══════════════════════════════════════
   SAMPLE SELECTOR
══════════════════════════════════════ */
.sample-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.sample-btn {
  font-family: var(--mono);
  font-size: .72rem;
  padding: 6px 13px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: .03em;
}
.sample-btn:hover {
  border-color: var(--blue);
  color: var(--blue);
  background: var(--blue-glow);
}
.sample-btn.active {
  border-color: var(--blue);
  color: var(--text);
  background: rgba(79,158,248,.12);
}

/* ══════════════════════════════════════
   FORM
══════════════════════════════════════ */
.form-grid {
  display: grid;
  gap: 14px;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
}

.field input,
.field textarea {
  font-family: var(--mono);
  font-size: .84rem;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  padding: 11px 14px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  resize: none;
  width: 100%;
}
.field input::placeholder,
.field textarea::placeholder { color: var(--muted2); }

.field input:focus,
.field textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(79,158,248,.12);
}

/* Dropzone & File Preview styles */
.dropzone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  background: var(--surface);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background-color var(--transition);
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--blue);
  background: rgba(79, 158, 248, 0.04);
}
.dropzone-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.dropzone-icon {
  font-size: 1.8rem;
}
.dropzone-text {
  font-family: var(--mono);
  font-size: .78rem;
  color: var(--text2);
}
.dropzone-highlight {
  color: var(--blue);
  font-weight: 600;
}
.dropzone-sub {
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--muted2);
}

.file-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-top: 8px;
  animation: fadeIn var(--transition) ease;
}
.file-icon {
  font-size: 1.4rem;
  color: var(--blue);
}
.file-details {
  flex: 1;
  min-width: 0;
}
.file-name {
  font-family: var(--mono);
  font-size: .78rem;
  font-weight: 500;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.file-size {
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
}
.file-clear {
  background: none;
  border: none;
  color: var(--muted);
  font-size: .9rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all var(--transition);
}
.file-clear:hover {
  color: var(--red);
  background: var(--red-glow);
}

/* ══════════════════════════════════════
   ACTIONS
══════════════════════════════════════ */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 6px;
}

.btn-primary {
  flex: 1;
  font-family: var(--mono);
  font-size: .84rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: 13px 20px;
  border-radius: var(--radius);
  border: none;
  background: var(--blue);
  color: #080C16;
  cursor: pointer;
  transition: all var(--transition);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover {
  background: #74b8ff;
  box-shadow: 0 6px 24px rgba(79,158,248,.35);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  opacity: .5; cursor: not-allowed; transform: none; box-shadow: none;
}

.btn-secondary {
  font-family: var(--mono);
  font-size: .8rem;
  padding: 13px 18px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
}
.btn-secondary:hover {
  border-color: var(--muted);
  color: var(--text);
}

/* ══════════════════════════════════════
   SPINNER
══════════════════════════════════════ */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(8,12,22,.4);
  border-top-color: #080C16;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════
   RESULTS SECTION
══════════════════════════════════════ */
#results {
  animation: fadeIn .35s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ── Verdict card ── */
.verdict-card {
  border-radius: var(--radius);
  padding: 22px 24px;
  border: 1px solid;
  display: flex;
  align-items: center;
  gap: 18px;
  position: relative;
  overflow: hidden;
}
.verdict-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
  border-radius: 4px 0 0 4px;
}
.verdict-card.phish {
  background: var(--red-glow);
  border-color: var(--red-border);
}
.verdict-card.phish::before  { background: var(--red); }
.verdict-card.safe {
  background: var(--green-glow);
  border-color: var(--green-border);
}
.verdict-card.safe::before   { background: var(--green); }

.verdict-emoji { font-size: 2.2rem; line-height: 1; }

.verdict-label {
  font-family: var(--mono);
  font-size: .6rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}
.verdict-text {
  font-family: var(--mono);
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1.1;
}
.verdict-text.red   { color: var(--red); }
.verdict-text.green { color: var(--green); }
.verdict-hint {
  font-size: .76rem;
  color: var(--muted);
  margin-top: 4px;
}

/* ── Gauge row ── */
.gauge-row {
  display: flex;
  align-items: center;
  gap: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 20px 24px;
}

.gauge-wrap { flex-shrink: 0; }

.gauge-info { flex: 1; min-width: 0; }
.gauge-eyebrow {
  font-family: var(--mono);
  font-size: .6rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  margin-bottom: 2px;
}
.gauge-number {
  font-family: var(--mono);
  font-size: 2.6rem;
  font-weight: 700;
  line-height: 1;
}
.gauge-number sup {
  font-size: 1rem;
  color: var(--muted);
  font-weight: 400;
}
.gauge-caption {
  font-size: .74rem;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.5;
}

/* ── Stats grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.stat-label {
  font-family: var(--mono);
  font-size: .59rem;
  text-transform: uppercase;
  letter-spacing: .13em;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat-val {
  font-family: var(--mono);
  font-size: 1.4rem;
  font-weight: 700;
}

/* ── Tags ── */
.tag-cloud { display: flex; flex-wrap: wrap; gap: 7px; }

.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px;
  border-radius: 5px;
  font-family: var(--mono);
  font-size: .7rem;
  font-weight: 500;
  border: 1px solid;
}
.tag-amber {
  background: var(--amber-glow);
  color: var(--amber);
  border-color: rgba(240,168,50,.25);
}
.tag-red {
  background: var(--red-glow);
  color: var(--red);
  border-color: var(--red-border);
}
.tag-green {
  background: var(--green-glow);
  color: var(--green);
  border-color: var(--green-border);
}

/* ── Explanation box ── */
.explain-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: .81rem;
  color: var(--muted);
  line-height: 1.65;
}

/* ── Error card ── */
.error-card {
  background: var(--amber-glow);
  border: 1px solid rgba(240,168,50,.28);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-family: var(--mono);
  font-size: .8rem;
  color: var(--amber);
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
footer {
  font-family: var(--mono);
  font-size: .6rem;
  letter-spacing: .1em;
  text-align: center;
  color: var(--muted2);
  padding-top: 20px;
  border-top: 1px solid var(--border);
  margin-top: 48px;
  text-transform: uppercase;
}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 560px) {
  .header-left { gap: 12px; }
  .header-title { font-size: 1.3rem; }
  .header-icon  { width: 42px; height: 42px; font-size: 20px; }
  .gauge-row { flex-direction: column; text-align: center; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .status-pill { display: none; }
}
</style>
</head>
<body>
<div class="page">

  <!-- ══ HEADER ══ -->
  <header>
    <div class="header-left">
      <div class="header-icon">🛡️</div>
      <div>
        <div class="header-title">PhishGuard</div>
        <div class="header-sub">Email Threat Analyzer</div>
      </div>
    </div>
    <div class="status-pill">
      <span class="dot"></span>System Online
    </div>
  </header>

  <!-- ══ SAMPLE LOADER ══ -->
  <div class="section-label">⚡ Quick Load</div>
  <div class="sample-row" id="sampleRow">
    <button class="sample-btn" data-sample="paypal">🚨 PayPal Scam</button>
    <button class="sample-btn" data-sample="bank">🏦 Bank Fraud</button>
    <button class="sample-btn" data-sample="lottery">🎁 Lottery Winner</button>
    <button class="sample-btn" data-sample="clear">✕ Clear</button>
  </div>

  <!-- ══ INPUT FORM ══ -->
  <div class="section-label">✉️ Email Input</div>
  <div class="form-grid">
    <div class="field">
      <label>Sender</label>
      <input id="sender" type="text" placeholder="e.g. PayPal Security &lt;alert@secure-paypal-login.com&gt;"/>
    </div>
    <div class="field">
      <label>Subject</label>
      <input id="subject" type="text" placeholder="e.g. Urgent: Your account has been limited"/>
    </div>
    <div class="field">
      <label>Email Body</label>
      <textarea id="body" rows="7" placeholder="Paste the full email body here…"></textarea>
    </div>
    <div class="field">
      <label>Attachment (optional)</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="attachmentInput" style="display:none;" />
        <div class="dropzone-inner">
          <span class="dropzone-icon">📁</span>
          <div class="dropzone-text">
            <span class="dropzone-highlight">Click to upload</span> or drag and drop
          </div>
          <div class="dropzone-sub">Max size 32MB</div>
        </div>
      </div>
      <div class="file-preview" id="filePreview" style="display:none;">
        <span class="file-icon">📄</span>
        <div class="file-details">
          <div class="file-name" id="fileName">file.pdf</div>
          <div class="file-size" id="fileSize">0 KB</div>
        </div>
        <button class="file-clear" onclick="clearAttachment(event)" type="button">✕</button>
      </div>
    </div>
  </div>

  <div class="actions" style="margin-top:16px;">
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">
      <span id="btnLabel">🔍 Analyze Email</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <button class="btn-secondary" onclick="clearAll()">✕ Clear</button>
  </div>

  <!-- ══ RESULTS ══ -->
  <div id="results" style="display:none;"></div>

  <!-- ══ FOOTER ══ -->
  <footer>PhishGuard · TF-IDF + Logistic Regression · Flask + Vanilla JS</footer>

</div>

<script>
/* ── Sample data ── */
const SAMPLES = {
  paypal: {
    sender:  "PayPal Security <alert@secure-paypal-login.com>",
    subject: "Urgent: Your PayPal account has been limited",
    body:    "Dear Customer, We noticed unusual activity on your PayPal account. Your account has been limited until you verify your information. Click the link immediately to restore access: http://paypal-secure-login.xyz/verify. Failure to act within 24 hours will result in permanent suspension. Enter your password and OTP to confirm."
  },
  bank: {
    sender:  "Citibank Support <security@citi-bank-alert.net>",
    subject: "Action Required: Confirm your wire transfer",
    body:    "Your account shows a pending wire transfer of $4,500. If you did not authorize this, login immediately to cancel. Confirm your credentials at: http://citibank-verify.co/login. Your account will be deactivated if no action is taken."
  },
  lottery: {
    sender:  "Google Rewards <winner@google-lottery-claim.com>",
    subject: "Congratulations! You've won a $500 Gift Card",
    body:    "You have been selected as our lucky winner! Claim your free $500 Google gift card now. Limited time offer — click to claim your prize: http://google-rewards-claim.tk/gift. Enter your details to receive your reward instantly."
  },
};

/* ── Attachment Drag & Drop Logic ── */
let selectedFile = null;
const dropzone = document.getElementById('dropzone');
const attachmentInput = document.getElementById('attachmentInput');
const filePreview = document.getElementById('filePreview');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');

// Trigger file input click
dropzone.addEventListener('click', () => {
  attachmentInput.click();
});

// File input selection
attachmentInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) {
    handleFile(e.target.files[0]);
  }
});

// Drag and drop handlers
dropzone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
  dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) {
    handleFile(e.dataTransfer.files[0]);
  }
});

function handleFile(file) {
  if (file.size > 32 * 1024 * 1024) {
    alert('File size exceeds the 32MB limit.');
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = formatBytes(file.size);
  dropzone.style.display = 'none';
  filePreview.style.display = 'flex';
}

function clearAttachment(e) {
  if (e) {
    e.stopPropagation();
    e.preventDefault();
  }
  selectedFile = null;
  attachmentInput.value = '';
  dropzone.style.display = 'block';
  filePreview.style.display = 'none';
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 Bytes';
  const k = 1024;
  const sizes = ['Bytes', 'KB', 'MB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}

/* ── Sample loader ── */
document.querySelectorAll('.sample-btn[data-sample]').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.sample;
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
    if (key === 'clear') { clearAll(); return; }
    const s = SAMPLES[key];
    document.getElementById('sender').value  = s.sender;
    document.getElementById('subject').value = s.subject;
    document.getElementById('body').value    = s.body;
    btn.classList.add('active');
  });
});

/* ── Clear ── */
function clearAll() {
  ['sender','subject','body'].forEach(id => document.getElementById(id).value = '');
  clearAttachment();
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
}

/* ── Gauge SVG ── */
function buildGauge(score) {
  const color  = score <= 30 ? '#23D18B' : score <= 65 ? '#F0A832' : '#F04747';
  const label  = score <= 30 ? 'LOW'     : score <= 65 ? 'MEDIUM'  : 'HIGH';
  const r = 44, cx = 60, cy = 62;
  const startDeg = 160, totalSweep = 220;
  const sweep = totalSweep * (score / 100);

  function polar(deg) {
    const rad = deg * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  const [bsx, bsy] = polar(startDeg);
  const [bex, bey] = polar(startDeg + totalSweep);
  const [sx,  sy]  = polar(startDeg);
  const [ex,  ey]  = polar(startDeg + sweep);
  const large = sweep > 180 ? 1 : 0;

  return `<svg width="120" height="108" viewBox="0 0 120 108">
    <path d="M${bsx.toFixed(1)} ${bsy.toFixed(1)} A${r} ${r} 0 1 1 ${bex.toFixed(1)} ${bey.toFixed(1)}"
          fill="none" stroke="#1C2840" stroke-width="8" stroke-linecap="round"/>
    ${score > 0 ? `<path d="M${sx.toFixed(1)} ${sy.toFixed(1)} A${r} ${r} 0 ${large} 1 ${ex.toFixed(1)} ${ey.toFixed(1)}"
          fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round" filter="url(#g)"/>` : ''}
    <defs>
      <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <text x="60" y="59" text-anchor="middle" font-family="JetBrains Mono" font-size="19" font-weight="700" fill="${color}">${score}</text>
    <text x="60" y="74" text-anchor="middle" font-family="JetBrains Mono" font-size="7" fill="#8493A8" letter-spacing="2">${label}</text>
  </svg>`;
}

/* ── Render helpers ── */
const tag = (text, cls) => `<span class="tag ${cls}">${text}</span>`;
const sec = (label, html) => html ? `<div class="section-label" style="margin-top:20px;">${label}</div>${html}` : '';

/* ── Render results ── */
function render(d) {
  const isPhish = d.prediction === 1;
  const gc      = d.threat_score <= 30 ? '#23D18B' : d.threat_score <= 65 ? '#F0A832' : '#F04747';
  const phishC  = d.phish_prob > 60 ? '#F04747' : d.phish_prob > 35 ? '#F0A832' : '#23D18B';
  const safeC   = d.safe_prob  > 60 ? '#23D18B' : '#8493A8';

  const getBadgeColor = status => status === 'Malicious' ? 'tag-red' : (status === 'Safe' ? 'tag-green' : 'tag-amber');
  const getStatusText = status => status === 'Malicious' ? 'Malicious' : (status === 'Safe' ? 'Safe' : status);

  // Keywords
  const kwHtml = d.keywords.length
    ? d.keywords.map(k => tag(`⚑ ${k}`, 'tag-amber')).join('')
    : tag('✓ No suspicious keywords found', 'tag-green');

  // URLs
  let urlHtml = '';
  if (d.virus_total_urls && d.virus_total_urls.length > 0) {
    const list = d.virus_total_urls.map(vt => `
      <div style="background:var(--surface2); padding:10px 14px; border-radius:8px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <span style="font-family:var(--mono); font-size:.78rem; word-break:break-all; flex:1; min-width:200px; color:var(--text);">${vt.url}</span>
        <div style="display:flex; align-items:center; gap:8px;">
          ${tag(getStatusText(vt.status), getBadgeColor(vt.status))}
          <span style="font-family:var(--mono); font-size:.65rem; color:var(--muted);">(Malicious: ${vt.malicious}, Harmless: ${vt.harmless})</span>
        </div>
      </div>
    `).join('');
    urlHtml = sec('🛡️ VirusTotal URL Analysis', `<div style="display:flex; flex-direction:column; gap:8px; margin-top:8px;">${list}</div>`);
  } else if (d.urls.length > 0) {
    urlHtml = sec('🔗 URLs Detected', `<div class="tag-cloud">${d.urls.map(u => tag(u.length > 52 ? u.slice(0,52)+'…' : u, 'tag-red')).join('')}</div>`);
  }

  // Attachment
  let attachmentHtml = '';
  if (d.virus_total_attachment) {
    const att = d.virus_total_attachment;
    let details = att.status !== 'No API Key' && att.status !== 'Unknown' && att.status !== 'Queued' && att.status !== 'Error' 
      ? `(Malicious: ${att.malicious}, Harmless: ${att.harmless})` : '';
    attachmentHtml = sec('📎 Attachment Analysis', `
      <div style="background:var(--surface2); padding:14px 18px; border-radius:8px; border:1px solid var(--border); margin-top:8px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:8px;">
          <div>
            <div style="font-family:var(--mono); font-size:.84rem; font-weight:600; color:var(--text);">${att.filename}</div>
            <div style="font-family:var(--mono); font-size:.68rem; color:var(--muted);">${formatBytes(att.size)} | Hash: ${att.hash.slice(0, 16)}...</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            ${tag(getStatusText(att.status), getBadgeColor(att.status))}
            <span style="font-family:var(--mono); font-size:.65rem; color:var(--muted);">${details}</span>
          </div>
        </div>
        ${att.type_description ? `<div style="font-family:var(--mono); font-size:.72rem; color:var(--text2);">File Type: ${att.type_description}</div>` : ''}
        ${att.message ? `<div style="font-family:var(--mono); font-size:.72rem; color:var(--amber); margin-top:4px;">ℹ️ ${att.message}</div>` : ''}
      </div>
    `);
  }

  // Sender Reputation
  let senderHtml = '';
  if (d.sender_reputation) {
    const rep = d.sender_reputation;
    let details = rep.status !== 'No API Key' && rep.status !== 'Unknown' && rep.status !== 'Error' 
      ? `(Malicious: ${rep.malicious}, Harmless: ${rep.harmless})` : '';
    senderHtml = sec('👤 Sender Reputation & Domain Analysis', `
      <div style="background:var(--surface2); padding:14px 18px; border-radius:8px; border:1px solid var(--border); margin-top:8px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <div>
            <div style="font-family:var(--mono); font-size:.84rem; font-weight:600; color:var(--text);">${rep.domain}</div>
            <div style="font-family:var(--mono); font-size:.68rem; color:var(--muted);">Domain age and threat history verified via VirusTotal.</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            ${tag(getStatusText(rep.status), getBadgeColor(rep.status))}
            <span style="font-family:var(--mono); font-size:.65rem; color:var(--muted);">${details}</span>
          </div>
        </div>
        ${rep.message ? `<div style="font-family:var(--mono); font-size:.72rem; color:var(--amber); margin-top:4px;">ℹ️ ${rep.message}</div>` : ''}
      </div>
    `);
  }

  const spfHtml = d.spoofed.length
    ? sec('🎭 Domain Spoofing Signals', `<div class="tag-cloud">${d.spoofed.map(s => tag(`⚠ "${s}"`, 'tag-red')).join('')}</div>`) : '';

  const explain = isPhish
    ? "The model identified patterns common to phishing emails — urgent language, account/security terminology, suspicious URLs, or credential-harvesting bait. TF-IDF weighted these signals heavily against its learned decision boundary."
    : "The model found no strong alignment with known phishing patterns across sender, subject, and body. Always cross-check unexpected emails, particularly those requesting action or containing links.";

  return `
    <div class="section-label">📊 Scan Result</div>

    <div class="verdict-card ${isPhish ? 'phish' : 'safe'}">
      <div class="verdict-emoji">${isPhish ? '🚨' : '✅'}</div>
      <div>
        <div class="verdict-label">Verdict</div>
        <div class="verdict-text ${isPhish ? 'red' : 'green'}">${isPhish ? 'Phishing Email' : 'Looks Safe'}</div>
        <div class="verdict-hint">${isPhish ? 'High-confidence threat. Do not click any links or reply.' : 'No strong phishing signals detected. Stay cautious regardless.'}</div>
      </div>
    </div>

    <div class="gauge-row" style="margin-top:12px;">
      <div class="gauge-wrap">${buildGauge(d.threat_score)}</div>
      <div class="gauge-info">
        <div class="gauge-eyebrow">Threat Score</div>
        <div class="gauge-number" style="color:${gc};">${d.threat_score}<sup>/100</sup></div>
        <div class="gauge-caption">Composite of model confidence, keyword density, URL presence, and domain spoofing signals.</div>
      </div>
    </div>

    <div class="stats-grid" style="margin-top:12px;">
      <div class="stat-cell"><div class="stat-label">Phishing Confidence</div><div class="stat-val" style="color:${phishC};">${d.phish_prob}%</div></div>
      <div class="stat-cell"><div class="stat-label">Safe Confidence</div><div class="stat-val" style="color:${safeC};">${d.safe_prob}%</div></div>
      <div class="stat-cell"><div class="stat-label">Suspicious Keywords</div><div class="stat-val" style="color:${d.keywords.length ? '#F0A832' : '#23D18B'};">${d.keywords.length}</div></div>
      <div class="stat-cell"><div class="stat-label">URLs Detected</div><div class="stat-val" style="color:${d.urls.length ? '#F04747' : '#23D18B'};">${d.urls.length}</div></div>
    </div>

    ${sec('🧠 Suspicious Indicators', `<div class="tag-cloud">${kwHtml}</div>`)}
    ${senderHtml}
    ${urlHtml}
    ${attachmentHtml}
    ${spfHtml}

    ${sec('📝 Why this verdict?', `<div class="explain-box">${explain}</div>`)}
  `;
}

/* ── Analyze ── */
async function analyze() {
  const sender  = document.getElementById('sender').value.trim();
  const subject = document.getElementById('subject').value.trim();
  const body    = document.getElementById('body').value.trim();

  if (!sender && !subject && !body && !selectedFile) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').innerHTML =
      `<div class="error-card">⚠ No input detected — fill at least one field or upload an attachment.</div>`;
    return;
  }

  /* Loading state */
  const btn = document.getElementById('analyzeBtn');
  document.getElementById('btnLabel').textContent = 'Analyzing…';
  document.getElementById('spinner').style.display = 'block';
  btn.disabled = true;

  try {
    const formData = new FormData();
    formData.append('sender', sender);
    formData.append('subject', subject);
    formData.append('body', body);
    if (selectedFile) {
      formData.append('attachment', selectedFile);
    }

    const res  = await fetch('http://127.0.0.1:5000/analyze', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    const el = document.getElementById('results');
    el.style.display = 'block';
    el.innerHTML = render(data);
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (err) {
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').innerHTML =
      `<div class="error-card">⚠ ${err.message || 'Could not reach the analysis server. Make sure Flask is running.'}</div>`;
  } finally {
    document.getElementById('btnLabel').textContent = '🔍 Analyze Email';
    document.getElementById('spinner').style.display = 'none';
    btn.disabled = false;
  }
}

/* Allow Enter in subject to trigger analyze */
document.getElementById('subject').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze();
});
</script>
